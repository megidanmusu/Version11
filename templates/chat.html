<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ 'rtl' if lang == 'ar' else 'ltr' }}">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A2463"><link rel="manifest" href="/static/manifest.json">
  <title>Chat Support - {{ get_app_name() }}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 120px)}
    .chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
    .chat-bubble{max-width:80%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word}
    .bubble-user{align-self:flex-end;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:white;border-bottom-right-radius:4px}
    .bubble-admin{align-self:flex-start;background:#f0f4ff;color:#333;border-bottom-left-radius:4px}
    .bubble-time{font-size:10px;opacity:0.65;margin-top:3px}
    .chat-input-row{display:flex;gap:8px;padding:10px 14px;background:white;border-top:1px solid #eee;position:sticky;bottom:0}
  </style>
</head>
<body>
<div class="page-header">
  <a href="/support" class="back-btn">←</a>
  <div class="page-title-wrap"><div class="page-title">💬 Live Chat</div></div>
  <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.8)">
    <span style="width:8px;height:8px;background:#06D6A0;border-radius:50%;display:inline-block"></span>Support
  </div>
</div>
<div class="chat-wrap">
  <div class="chat-msgs" id="chat-msgs">
    {% if not messages %}
    <div style="text-align:center;padding:30px;color:var(--muted)">
      <div style="font-size:32px;margin-bottom:8px">💬</div>
      <div style="font-size:13px;font-weight:700">Start a conversation</div>
      <div style="font-size:12px;margin-top:4px">Send a message and our support team will reply soon.</div>
    </div>
    {% endif %}
    {% for m in messages %}
    <div>
      <div class="chat-bubble {{ 'bubble-user' if m.sender_role=='user' else 'bubble-admin' }}">
        {% if m.sender_role=='admin' %}<div style="font-size:10px;font-weight:800;color:var(--primary);margin-bottom:3px">Support</div>{% endif %}
        {{ m.message }}
      </div>
      <div class="bubble-time" style="text-align:{{ 'right' if m.sender_role=='user' else 'left' }}">{{ m.time[:16].replace('T',' ') if m.time else '' }}</div>
    </div>
    {% endfor %}
    <div id="typing-indicator" style="display:none">
      <div class="chat-bubble bubble-admin" style="padding:10px 16px">
        <span style="display:inline-flex;gap:3px">
          <span style="width:6px;height:6px;background:#999;border-radius:50%;animation:bounce 1s infinite"></span>
          <span style="width:6px;height:6px;background:#999;border-radius:50%;animation:bounce 1s 0.2s infinite"></span>
          <span style="width:6px;height:6px;background:#999;border-radius:50%;animation:bounce 1s 0.4s infinite"></span>
        </span>
      </div>
    </div>
  </div>
  <div class="chat-input-row">
    <input type="text" class="form-control" id="chat-inp" placeholder="Type a message..." style="flex:1" onkeydown="if(event.key==='Enter')sendChat()">
    <button class="btn btn-primary" onclick="sendChat()" id="chat-send-btn" style="padding:10px 16px">Send</button>
  </div>
</div>
<style>
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
</style>
<div id="toast-container" class="toast-container"></div>
<script src="/static/js/app.js"></script>
<script>
const chatMsgs = document.getElementById('chat-msgs');
chatMsgs.scrollTop = chatMsgs.scrollHeight;

async function sendChat() {
  const inp = document.getElementById('chat-inp');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  // Optimistic UI
  const bubble = document.createElement('div');
  bubble.innerHTML = `<div class="chat-bubble bubble-user">${msg}</div><div class="bubble-time" style="text-align:right">Just now</div>`;
  chatMsgs.appendChild(bubble);
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
  const fd = new FormData();
  fd.append('message', msg);
  const r = await postForm('/chat/send', fd, null);
  if (!r?.success) {
    bubble.remove();
    showToast(r?.message || 'Failed to send', 'error');
  }
}
// Poll for new admin messages
setInterval(async () => {
  try {
    const r = await fetch('/api/notif_count',{credentials:'same-origin'});
    // Just refresh if there's something new — simple approach
  } catch {}
}, 15000);
</script>
</body>
</html>
